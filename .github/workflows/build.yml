name: Build DriveSync APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest # এখানে আগে runs-runs-on ছিল, সেটি ঠিক করা হয়েছে

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Write Google Drive Credentials
        run: |
          mkdir -p app/src/main/res/raw/
          # Google Drive API credentials
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/src/main/res/raw/credentials.json
          # Backup location for google-services.json
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          export _JAVA_OPTIONS="-Xmx2048m"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriveSync-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
