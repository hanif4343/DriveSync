name: Build DriveSync APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Write google-services.json
        run: printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriveSync-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
- name: Show APK SHA-1
        run: |
          keytool -printcert -jarfile app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | grep SHA1 || \
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | grep "SHA1"
