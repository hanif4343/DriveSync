Name: Build DriveSync APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Write google-services.json
        run: printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/drivesync.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Signed APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=drivesync.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      - name: Show Final APK SHA-1
        run: |
          keytool -printcert -jarfile app/build/outputs/apk/debug/app-debug.apk | grep SHA1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriveSync-Signed-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
