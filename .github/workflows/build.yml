name: Build DriveSync APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # লেটেস্ট ভার্সন ব্যবহার করা নিরাপদ

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # এটি আলাদা ক্যাশ স্টেপের প্রয়োজনীয়তা কমিয়ে দেয়

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write google-services.json
        if: env.HAS_JSON == 'true'
        env:
          HAS_JSON: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo "Written $(wc -c < app/google-services.json) bytes"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DriveSync-debug-apk
          path: app/build/outputs/apk/debug/*.apk # সব APK ফাইল খুঁজে নেবে
          retention-days: 30

      - name: Done
        run: echo "APK ready! Download from Artifacts."
